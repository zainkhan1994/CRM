<!doctype html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zain CRM</title>
  <style>
    :root {
      --app-bg: #f5f7fb;
      --nav-bg: #151922;
      --panel: #ffffff;
      --line: #dce4f2;
      --line-soft: #edf1f7;
      --text: #172033;
      --muted: #66738a;
      --muted-2: #8b98ad;
      --blue: #2f6df6;
      --blue-soft: #eaf1ff;
      --green: #12a56b;
      --red: #ea3d4f;
      --amber: #f1a208;
      --purple: #8b5cf6;
      --shadow: 0 18px 45px rgba(31, 45, 70, .10);
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 1180px;
      background: var(--app-bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .shell {
      display: grid;
      grid-template-columns: 220px minmax(680px, 1fr) 320px;
      min-height: 100vh;
    }

    .sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 22px 14px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .brand {
      display: grid;
      grid-template-columns: 34px 1fr;
      gap: 10px;
      align-items: center;
      padding: 0 8px;
    }

    .brand-mark, .nav-icon, .avatar, .logo, .action-icon {
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      background: var(--blue);
      color: #fff;
      font-weight: 900;
    }

    .brand-title { font-weight: 800; line-height: 1.1; }
    .brand-subtitle { color: var(--muted); font-size: 11px; margin-top: 2px; }

    .nav { display: grid; gap: 6px; }
    .nav button {
      border: 0;
      border-radius: var(--radius);
      min-height: 38px;
      display: grid;
      grid-template-columns: 26px 1fr auto;
      align-items: center;
      gap: 8px;
      background: transparent;
      color: var(--muted);
      padding: 0 10px;
      text-align: left;
      font-weight: 650;
    }
    .nav button.active {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 22px rgba(47, 109, 246, .24);
    }
    .nav-icon { width: 20px; height: 20px; font-size: 14px; }
    .nav-count {
      min-width: 22px;
      text-align: center;
      border-radius: 999px;
      color: inherit;
      opacity: .82;
      font-size: 11px;
    }

    .account {
      margin-top: auto;
      display: grid;
      grid-template-columns: 36px 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 8px;
      border-top: 1px solid var(--line-soft);
    }

    .account .avatar { width: 36px; height: 36px; border-radius: 50%; }
    .avatar img, .logo img { width: 100%; height: 100%; object-fit: cover; }
    .account-name { font-weight: 750; }
    .account-email { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .main {
      padding: 26px 28px;
      min-width: 0;
    }

    .main-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }
    h1 {
      margin: 0 0 5px;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subhead { color: var(--muted); margin: 0; }

    .head-actions { display: flex; gap: 10px; }
    .btn {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      min-height: 38px;
      padding: 0 14px;
      background: var(--panel);
      color: var(--text);
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn.primary {
      border-color: var(--blue);
      background: var(--blue);
      color: #fff;
      box-shadow: 0 10px 22px rgba(47, 109, 246, .24);
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) auto auto auto;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }

    .search {
      position: relative;
    }
    .search span {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-2);
    }
    input, select, textarea {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: var(--radius);
      color: var(--text);
      outline: none;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(47, 109, 246, .13);
    }
    .search input {
      width: 100%;
      min-height: 40px;
      padding: 0 14px 0 38px;
    }
    select {
      min-height: 40px;
      padding: 0 34px 0 12px;
      color: var(--muted);
      font-weight: 700;
    }

    .chip {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--panel);
      color: var(--blue);
      padding: 0 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .table-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    thead {
      background: #fbfcff;
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    th, td {
      height: 62px;
      border-bottom: 1px solid var(--line-soft);
      padding: 0 14px;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th:first-child, td:first-child { width: 48px; text-align: center; }
    th:nth-child(2), td:nth-child(2) { width: 250px; }
    th:nth-child(3), td:nth-child(3) { width: 170px; }
    th:nth-child(4), td:nth-child(4) { width: 145px; }
    th:nth-child(5), td:nth-child(5) { width: 120px; }
    th:nth-child(6), td:nth-child(6) { width: 120px; text-align: right; }
    tbody tr { transition: background .12s ease; }
    tbody tr:hover, tbody tr.active { background: #f7faff; }
    tbody tr.active td:first-child .check { background: var(--blue); border-color: var(--blue); color: #fff; }

    .check {
      width: 18px;
      height: 18px;
      border: 1px solid var(--line);
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      color: transparent;
      font-size: 11px;
      font-weight: 900;
      background: #fff;
    }

    .person {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      min-width: 0;
    }
    .logo {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 850;
      font-size: 12px;
    }
    .name { font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .email { color: var(--muted); font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 5px 9px;
      font-weight: 750;
      font-size: 11px;
      background: var(--blue-soft);
      color: var(--blue);
    }
    .status::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .value { font-weight: 800; }

    .pager {
      min-height: 56px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 14px;
      color: var(--muted);
    }
    .page-buttons { display: flex; gap: 6px; }
    .page-buttons button {
      width: 34px;
      height: 34px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      color: var(--muted);
      font-weight: 750;
    }
    .page-buttons button.active {
      border-color: var(--blue);
      background: var(--blue-soft);
      color: var(--blue);
    }

    .detail {
      border-left: 1px solid var(--line);
      background: var(--panel);
      padding: 28px 24px;
      min-width: 0;
    }
    .close {
      margin-left: auto;
      width: 30px;
      height: 30px;
      border: 0;
      background: transparent;
      color: var(--muted-2);
      font-size: 24px;
      line-height: 1;
    }
    .profile {
      display: grid;
      justify-items: center;
      text-align: center;
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line-soft);
    }
    .profile .logo {
      width: 82px;
      height: 82px;
      margin-bottom: 13px;
      font-size: 22px;
      border-width: 2px;
    }
    .profile h2 {
      margin: 0 0 4px;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0;
      max-width: 100%;
      overflow-wrap: anywhere;
    }
    .profile p { margin: 0; color: var(--muted); }
    .quick-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .action-icon {
      width: 34px;
      height: 34px;
      border: 0;
      border-radius: 50%;
      background: var(--blue-soft);
      color: var(--blue);
      font-weight: 850;
    }

    .detail-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      margin: 18px -24px 20px;
      border-bottom: 1px solid var(--line-soft);
    }
    .detail-tabs button {
      border: 0;
      background: transparent;
      color: var(--muted);
      height: 38px;
      font-weight: 750;
      position: relative;
    }
    .detail-tabs button.active { color: var(--blue); }
    .detail-tabs button.active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: -1px;
      height: 2px;
      background: var(--blue);
    }

    .section-title {
      margin: 18px 0 10px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .detail-list { display: grid; gap: 12px; }
    .detail-line {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 10px;
      align-items: start;
      color: var(--text);
      min-width: 0;
    }
    .detail-line .mini {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: #f2f5fb;
      color: var(--muted);
      display: grid;
      place-items: center;
      font-size: 12px;
    }
    .detail-line span:last-child {
      overflow-wrap: anywhere;
      line-height: 1.35;
    }
    .tiny { display: block; color: var(--muted); font-size: 11px; margin-top: 2px; }

    .properties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .prop {
      min-height: 64px;
      border-radius: var(--radius);
      background: #f7f9fd;
      border: 1px solid var(--line-soft);
      padding: 10px;
      overflow: hidden;
    }
    .prop-label { color: var(--muted); font-size: 11px; margin-bottom: 7px; }
    .prop-value {
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .priority {
      color: var(--red);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .priority::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--red);
    }

    .activity { display: grid; gap: 9px; max-height: 220px; overflow: auto; padding-right: 4px; }
    .activity-item {
      border-left: 2px solid var(--blue);
      padding: 0 0 0 10px;
      color: var(--muted);
      line-height: 1.42;
    }
    .activity-item strong { display: block; color: var(--text); margin-bottom: 2px; }
    .empty { color: var(--muted); padding: 24px; }

    @media (max-width: 1180px) {
      body { min-width: 0; }
      .shell { grid-template-columns: 86px minmax(0, 1fr); }
      .sidebar { padding: 18px 10px; }
      .brand { grid-template-columns: 1fr; justify-items: center; padding: 0; }
      .brand-title, .brand-subtitle, .nav span.label, .nav-count, .account div:last-child { display: none; }
      .nav button { grid-template-columns: 1fr; justify-items: center; padding: 0; }
      .detail { grid-column: 2; border-top: 1px solid var(--line); border-left: 0; }
      .toolbar { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">C</div>
        <div>
          <div class="brand-title">Zain CRM</div>
          <div class="brand-subtitle">Gmail Workspace</div>
        </div>
      </div>

      <nav class="nav" id="domainTabs" aria-label="Segments"></nav>

      <div class="account">
        <div class="avatar"><img alt="" src="https://www.google.com/s2/favicons?domain=gmail.com&sz=64"></div>
        <div>
          <div class="account-name">Zain Khan</div>
          <div class="account-email">zainkhan1994.ZK@gmail.com</div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="main-head">
        <div>
          <h1>Contacts</h1>
          <p class="subhead">Manage your leads and customer relationships</p>
        </div>
        <div class="head-actions">
          <button class="btn" type="button">Import</button>
          <button class="btn primary" type="button">+ Add Contact</button>
        </div>
      </header>

      <section class="toolbar">
        <label class="search">
          <span>Q</span>
          <input id="searchInput" type="search" placeholder="Search contacts by name, email, or company...">
        </label>
        <select id="typeSelect" aria-label="Type"><option value="All">Filter</option></select>
        <select id="categorySelect" aria-label="Category"><option value="All">All contacts</option></select>
        <span class="chip"><span id="shownCount">0</span> shown</span>
      </section>

      <section class="table-card">
        <table>
          <thead>
            <tr>
              <th><span class="check"></span></th>
              <th>Name</th>
              <th>Company</th>
              <th>Phone</th>
              <th>Last Contact</th>
              <th>Value</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="6" class="empty">Loading contacts...</td></tr>
          </tbody>
        </table>
        <footer class="pager">
          <span id="resultLabel">Showing 0 results</span>
          <div class="page-buttons" id="pager"></div>
        </footer>
      </section>
    </main>

    <aside class="detail">
      <button class="close" type="button" aria-label="Close">x</button>
      <div id="detailPanel" class="empty">Loading contact details...</div>
    </aside>
  </div>

  <script>
    const segmentIcons = {
      All: 'A',
      Systems: 'S',
      Personal: '$',
      Growth: 'G',
      Projects: 'P',
      Work: 'W',
      Health: '+'
    };

    let data = null;
    let activeDomain = 'All';
    let selectedId = '';
    let page = 1;
    const pageSize = 8;

    const rows = document.getElementById('rows');
    const pager = document.getElementById('pager');
    const detailPanel = document.getElementById('detailPanel');
    const searchInput = document.getElementById('searchInput');
    const domainTabs = document.getElementById('domainTabs');
    const categorySelect = document.getElementById('categorySelect');
    const typeSelect = document.getElementById('typeSelect');

    google.script.run
      .withSuccessHandler((payload) => {
        data = payload || { contacts: [], totals: { contacts: 0, rows: 0, companies: 0 } };
        selectedId = data.contacts[0] ? data.contacts[0].id : '';
        hydrateFilters();
        render();
      })
      .withFailureHandler((error) => {
        rows.innerHTML = '<tr><td colspan="6" class="empty">Could not load the sheet: ' + escapeHtml(error.message || error) + '</td></tr>';
        detailPanel.innerHTML = '<div class="empty">Sheet load failed.</div>';
      })
      .getCrmData();

    function hydrateFilters() {
      const categories = [...new Set(data.contacts.map((contact) => contact.category).filter(Boolean))].sort();
      categorySelect.innerHTML = '<option value="All">My Contacts</option>' + categories.map((category) =>
        '<option value="' + escapeHtml(category) + '">' + escapeHtml(category) + '</option>'
      ).join('');

      const types = [...new Set(data.contacts.map((contact) => contact.type).filter(Boolean))].sort();
      typeSelect.innerHTML = '<option value="All">Filter</option>' + types.map((type) =>
        '<option value="' + escapeHtml(type) + '">' + escapeHtml(type) + '</option>'
      ).join('');
    }

    function buildNav() {
      const counts = data.contacts.reduce((map, contact) => {
        map[contact.domain] = (map[contact.domain] || 0) + 1;
        return map;
      }, {});
      counts.All = data.contacts.length;
      const segments = ['All', 'Work', 'Projects', 'Growth', 'Systems', 'Personal', 'Health']
        .filter((segment) => segment === 'All' || counts[segment]);
      domainTabs.innerHTML = segments.map((segment) =>
        '<button type="button" class="' + (segment === activeDomain ? 'active' : '') + '" data-domain="' + escapeHtml(segment) + '">' +
          '<span class="nav-icon">' + escapeHtml(segmentIcons[segment] || '-') + '</span>' +
          '<span class="label">' + escapeHtml(segment === 'All' ? 'Dashboard' : segment) + '</span>' +
          '<span class="nav-count">' + Number(counts[segment] || 0).toLocaleString() + '</span>' +
        '</button>'
      ).join('');
      domainTabs.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          activeDomain = button.dataset.domain;
          page = 1;
          render();
        });
      });
    }

    function filteredContacts() {
      const query = searchInput.value.trim().toLowerCase();
      const category = categorySelect.value;
      const type = typeSelect.value;

      return data.contacts.filter((contact) => {
        const haystack = [
          contact.name,
          contact.company,
          contact.primaryEmail,
          contact.emails.join(' '),
          contact.domains.join(' '),
          contact.category,
          contact.domain,
          contact.type,
          contact.latestSnippet
        ].join(' ').toLowerCase();

        return (activeDomain === 'All' || contact.domain === activeDomain)
          && (category === 'All' || contact.category === category)
          && (type === 'All' || contact.type === type)
          && (!query || haystack.includes(query));
      });
    }

    function render() {
      buildNav();
      const list = filteredContacts();
      const maxPage = Math.max(1, Math.ceil(list.length / pageSize));
      page = Math.min(page, maxPage);
      if (!list.some((contact) => contact.id === selectedId)) selectedId = list[0] ? list[0].id : '';
      document.getElementById('shownCount').textContent = list.length.toLocaleString();
      renderRows(list);
      renderPager(list, maxPage);
      renderDetail(list);
    }

    function renderRows(list) {
      if (!list.length) {
        rows.innerHTML = '<tr><td colspan="6" class="empty">No matching contacts.</td></tr>';
        return;
      }

      const start = (page - 1) * pageSize;
      const pageItems = list.slice(start, start + pageSize);
      rows.innerHTML = pageItems.map((contact) =>
        '<tr class="' + (contact.id === selectedId ? 'active' : '') + '" data-id="' + escapeHtml(contact.id) + '">' +
          '<td><span class="check">v</span></td>' +
          '<td><div class="person">' + logoHtml(contact) + '<div><div class="name">' + escapeHtml(contact.name) + '</div><div class="email">' + escapeHtml(contact.primaryEmail || contact.domains[0] || 'No email') + '</div></div></div></td>' +
          '<td>' + escapeHtml(contact.company || contact.domains[0] || '-') + '</td>' +
          '<td>' + escapeHtml(inferPhone(contact)) + '</td>' +
          '<td>' + escapeHtml(contact.latestDate || 'Unknown') + '</td>' +
          '<td class="value">' + escapeHtml(formatValue(contact)) + '</td>' +
        '</tr>'
      ).join('');

      rows.querySelectorAll('tr[data-id]').forEach((row) => {
        row.addEventListener('click', () => {
          selectedId = row.dataset.id;
          render();
        });
      });
    }

    function renderPager(list, maxPage) {
      const start = list.length ? ((page - 1) * pageSize) + 1 : 0;
      const end = Math.min(page * pageSize, list.length);
      document.getElementById('resultLabel').textContent = 'Showing ' + start + ' to ' + end + ' of ' + list.length.toLocaleString() + ' results';
      const pages = pageWindow(maxPage);
      pager.innerHTML =
        '<button type="button" data-page="' + Math.max(1, page - 1) + '">&lt;</button>' +
        pages.map((num) => '<button type="button" class="' + (num === page ? 'active' : '') + '" data-page="' + num + '">' + num + '</button>').join('') +
        '<button type="button" data-page="' + Math.min(maxPage, page + 1) + '">&gt;</button>';
      pager.querySelectorAll('button').forEach((button) => {
        button.addEventListener('click', () => {
          page = Number(button.dataset.page);
          render();
        });
      });
    }

    function renderDetail(list) {
      const contact = list.find((item) => item.id === selectedId) || list[0];
      if (!contact) {
        detailPanel.innerHTML = '<div class="empty">No contact selected.</div>';
        return;
      }

      detailPanel.innerHTML =
        '<section class="profile">' +
          logoHtml(contact) +
          '<h2>' + escapeHtml(contact.name) + '</h2>' +
          '<p>' + escapeHtml(contact.type) + ' at ' + escapeHtml(contact.company || contact.domains[0] || 'Unknown') + '</p>' +
          '<div class="quick-actions"><button class="action-icon" type="button">P</button><button class="action-icon" type="button">@</button><button class="action-icon" type="button">N</button><button class="action-icon" type="button">...</button></div>' +
        '</section>' +
        '<div class="detail-tabs"><button class="active" type="button">Overview</button><button type="button">Activity</button><button type="button">Notes</button></div>' +
        '<h3 class="section-title">Contact Details</h3>' +
        '<div class="detail-list">' +
          detailLine('@', contact.primaryEmail || contact.emails[0] || 'No email', contact.type) +
          detailLine('P', inferPhone(contact), 'Phone') +
          detailLine('D', primaryDomain(contact) || 'No domain', contact.domain) +
        '</div>' +
        '<h3 class="section-title">Properties</h3>' +
        '<div class="properties">' +
          property('Source', sourceLabel(contact)) +
          property('Priority', '<span class="priority">' + priorityLabel(contact) + '</span>', true) +
          property('Rows', contact.count + ' source rows') +
          property('Value', formatValue(contact)) +
        '</div>' +
        '<h3 class="section-title">Recent Activity</h3>' +
        '<div class="activity">' + activityHtml(contact) + '</div>';
    }

    function pageWindow(maxPage) {
      const start = Math.max(1, Math.min(page - 1, maxPage - 2));
      const pages = [];
      for (let i = start; i <= maxPage && pages.length < 3; i++) pages.push(i);
      return pages;
    }

    function logoHtml(contact) {
      const initials = initialsFor(contact.name || contact.company || contact.primaryEmail || '?');
      const domain = contact.logoDomain || primaryDomain(contact);
      if (!domain) return '<div class="logo">' + escapeHtml(initials) + '</div>';
      const url = 'https://www.google.com/s2/favicons?domain=' + encodeURIComponent(domain) + '&sz=128';
      return '<div class="logo"><img src="' + url + '" alt="" loading="lazy"></div>';
    }

    function detailLine(icon, value, sub) {
      return '<div class="detail-line"><span class="mini">' + escapeHtml(icon) + '</span><span>' + escapeHtml(value || '-') + '<small class="tiny">' + escapeHtml(sub || '') + '</small></span></div>';
    }

    function property(label, value, raw) {
      return '<div class="prop"><div class="prop-label">' + escapeHtml(label) + '</div><div class="prop-value">' + (raw ? value : escapeHtml(value)) + '</div></div>';
    }

    function activityHtml(contact) {
      const snippets = contact.snippets && contact.snippets.length ? contact.snippets.slice(0, 4) : [contact.latestSnippet || 'No snippet captured.'];
      return snippets.map((snippet, index) =>
        '<div class="activity-item"><strong>Email thread ' + (index + 1) + '</strong>' + escapeHtml(snippet) + '<small class="tiny">' + escapeHtml(contact.latestDate || 'Unknown date') + '</small></div>'
      ).join('');
    }

    function initialsFor(value) {
      return String(value || '?').split(/[\s@._-]+/).filter(Boolean).slice(0, 2).map((part) => part[0]).join('').toUpperCase() || '?';
    }

    function primaryDomain(contact) {
      return (contact.domains && contact.domains[0]) || contact.logoDomain || domainFromEmail(contact.primaryEmail) || '';
    }

    function domainFromEmail(email) {
      const parts = String(email || '').split('@');
      return parts.length === 2 ? parts[1] : '';
    }

    function sourceLabel(contact) {
      if (/linkedin/i.test([contact.name, contact.primaryEmail, primaryDomain(contact), contact.latestSnippet].join(' '))) return 'LinkedIn';
      if (/event|community|gdg|meetup/i.test([contact.name, contact.primaryEmail, primaryDomain(contact), contact.latestSnippet].join(' '))) return 'Community';
      if (/newsletter/i.test([contact.name, contact.primaryEmail, contact.latestSnippet].join(' '))) return 'Newsletter';
      return 'Gmail';
    }

    function priorityLabel(contact) {
      if (contact.count >= 10) return 'High';
      if (contact.count >= 3) return 'Medium';
      return 'New';
    }

    function inferPhone(contact) {
      const text = [contact.latestSnippet, ...(contact.snippets || [])].join(' ');
      const match = text.match(/(?:\+?1[\s.-]?)?\(?\d{3}\)?[\s.-]?\d{3}[\s.-]?\d{4}/);
      return match ? match[0] : '-';
    }

    function formatValue(contact) {
      const value = contact.count * 1250;
      return '$' + value.toLocaleString();
    }

    function escapeHtml(value) {
      return String(value || '').replace(/[&<>"']/g, (character) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      }[character]));
    }

    [searchInput, categorySelect, typeSelect].forEach((control) => {
      control.addEventListener('input', () => { page = 1; render(); });
      control.addEventListener('change', () => { page = 1; render(); });
    });
  </script>
</body>
</html>
